<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mi Página</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
      color: white;
      text-align: center;
    }

    .container {
      margin-top: 80px;
    }

    img {
      width: 120px;
      border-radius: 50%;
      border: 3px solid white;
    }

    h1 {
      margin: 15px 0 5px;
    }

    p {
      color: #ccc;
    }

    .btn {
      display: block;
      width: 80%;
      max-width: 300px;
      margin: 15px auto;
      padding: 15px;
      border-radius: 30px;
      background: white;
      color: #333;
      text-decoration: none;
      font-weight: bold;
      transition: 0.3s;
    }

    .btn:hover {
      background: #00c6ff;
      color: white;
      transform: scale(1.05);
    }

    .footer {
      margin-top: 40px;
      font-size: 12px;
      color: #aaa;
    }
  </style>
</head>

<body>

  <div class="container">

    <img src="https://via.placeholder.com/120" alt="foto">

    <h1>Tu Nombre 🔥</h1>
    <p>Productor | Música | Iglesia</p>

    <a href="#" class="btn">🎧 Escuchar música</a>
    <a href="#" class="btn">📸 Instagram</a>
    <a href="#" class="btn">🎥 YouTube</a>
    <a href="#" class="btn">📞 Contacto</a>

    <div class="footer">
      Hecho con GitHub Pages 🚀
    </div>

  </div>

</body>
</html>
